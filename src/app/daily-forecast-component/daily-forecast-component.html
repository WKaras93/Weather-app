<div class="daily-forecast-container">
    <p class="title">Daily forecast</p>

    <div class="days-container">
        @for (day of dailyForecasts; track day) {
            <div class="day-card">
                <p>{{ day.day }}</p>

                <img [src]="getWeatherIcon(day.forecastCode)" alt="">

                <div class="temperature-container">
                    <p>{{ day.maxTemperature }}</p>
                    <p>{{ day.minTemperature }}</p>
                </div>
            </div>
        }
    </div>
</div>
